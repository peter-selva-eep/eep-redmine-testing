name: Validate Redmine Ticket on PR

on:
  pull_request:
    branches:
      - develop
    types: [opened, reopened, synchronize, closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate-ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Check VALIDATE_REDMINE flag
        id: flag
        run: |
          FLAG="${{ vars.VALIDATE_REDMINE }}"
          if [ "$FLAG" = "YES" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if disabled
        if: steps.flag.outputs.enabled == 'false'
        run: echo "Skipping Redmine validation"

      - name: Extract issue number from branch
        if: steps.flag.outputs.enabled == 'true'
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          ISSUE_ID=$(echo "$BRANCH" | grep -oP '\d+')
          if [ -z "$ISSUE_ID" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Check ticket in Redmine
        if: steps.extract.outputs.found == 'true'
        id: check
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          PROJECT_NAME="${{ vars.REDMINE_PROJECT_NAME }}"
          REDMINE_URL="${{ vars.REDMINE_URL }}"

          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            "$REDMINE_URL/issues/$ISSUE_ID.json")

          if [ "$RESPONSE" = "200" ]; then
            PROJECT=$(python3 -c "import json;print(json.load(open('response.json'))['issue']['project']['name'])")
            STATUS=$(python3 -c "import json;print(json.load(open('response.json'))['issue']['status']['name'])")

            echo "project=$PROJECT" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          else
            echo "project=not_found" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
            echo "status=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Get approvers (Mapped to Redmine names)
        if: steps.extract.outputs.found == 'true'
        id: reviewers
        uses: actions/github-script@v8
        env:
          USER_MAP: ${{ vars.GITHUB_TO_REDMINE_USERS }}
        with:
          script: |
            const mapping = JSON.parse(process.env.USER_MAP || '{}');

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const approvers = reviews.data
              .filter(r => r.state === 'APPROVED')
              .map(r => {
                const gh = r.user.login;
                return mapping[gh] || gh;
              })
              .join(', ') || 'None';

            core.setOutput('approvers', approvers);

      - name: Fail if invalid ticket
        if: steps.extract.outputs.found == 'false' || steps.check.outputs.project != steps.check.outputs.expected
        run: |
          echo "Invalid Redmine ticket"
          exit 1

      # -----------------------------
      # Move ticket to Ready for Review
      # -----------------------------
      - name: Move to Ready for Review
        if: github.event.action != 'closed' && steps.check.outputs.status == 'In Progress'
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          REDMINE_URL="${{ vars.REDMINE_URL }}"

          STATUS_ID=$(curl -s -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            "$REDMINE_URL/issue_statuses.json" | \
            python3 -c "import sys,json;print([s['id'] for s in json.load(sys.stdin)['issue_statuses'] if s['name']=='Ready for Review'][0])")

          curl -X PUT \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"issue\":{\"status_id\":$STATUS_ID}}" \
            "$REDMINE_URL/issues/$ISSUE_ID.json"

      # -----------------------------
      # Move ticket to Ready for QA
      # -----------------------------
      - name: Move to Ready for QA
        if: github.event.pull_request.merged == true && steps.check.outputs.status == 'Ready for Review'
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          REDMINE_URL="${{ vars.REDMINE_URL }}"

          STATUS_ID=$(curl -s -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            "$REDMINE_URL/issue_statuses.json" | \
            python3 -c "import sys,json;print([s['id'] for s in json.load(sys.stdin)['issue_statuses'] if s['name']=='Ready for QA'][0])")

          curl -X PUT \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"issue\":{\"status_id\":$STATUS_ID}}" \
            "$REDMINE_URL/issues/$ISSUE_ID.json"

      # -----------------------------
      # Comment (PR Opened)
      # -----------------------------
      - name: Comment to Redmine (PR Opened)
        if: github.event.action != 'closed'
        env:
          USER_MAP: ${{ vars.GITHUB_TO_REDMINE_USERS }}
        run: |
          python3 <<EOF
          import os, json, urllib.request
          
          user_map = json.loads(os.environ.get('USER_MAP','{}'))
          
          author = user_map.get("${{ github.event.pull_request.user.login }}",
                                "${{ github.event.pull_request.user.login }}")
          
          issue_id = "${{ steps.extract.outputs.issue_id }}"
          url = "${{ vars.REDMINE_URL }}/issues/" + issue_id + ".json"
          
          comment = f"""GitHub Pull Request Notification
          
          Status: PR opened
          PR Number: #${{ github.event.pull_request.number }}
          PR Title: ${{ github.event.pull_request.title }}
          PR URL: ${{ github.event.pull_request.html_url }}
          
          From Branch: ${{ github.event.pull_request.head.ref }}
          To Branch: ${{ github.event.pull_request.base.ref }}
          
          PR Opened By: {author}"""
          
          data = json.dumps({"issue":{"notes":comment}}).encode()
          
          req = urllib.request.Request(url, data=data, method="PUT")
          req.add_header("X-Redmine-API-Key", "${{ secrets.REDMINE_API_KEY }}")
          req.add_header("Content-Type", "application/json")
          
          urllib.request.urlopen(req)
          EOF
          
                # -----------------------------
                # Comment (PR Closed / Merged)
                # -----------------------------
                - name: Comment to Redmine (PR Closed/Merged)
                  if: github.event.action == 'closed'
                  env:
                    USER_MAP: ${{ vars.GITHUB_TO_REDMINE_USERS }}
                  run: |
                    python3 <<EOF
          import os, json, urllib.request
          
          user_map = json.loads(os.environ.get('USER_MAP','{}'))
          
          author = user_map.get("${{ github.event.pull_request.user.login }}",
                                "${{ github.event.pull_request.user.login }}")
          
          issue_id = "${{ steps.extract.outputs.issue_id }}"
          url = "${{ vars.REDMINE_URL }}/issues/" + issue_id + ".json"
          
          merged = "${{ github.event.pull_request.merged }}"
          approvers = "${{ steps.reviewers.outputs.approvers }}"
          
          if merged == "true":
              comment = f"""GitHub Pull Request MERGED
          
          Status: MERGED
          PR Number: #${{ github.event.pull_request.number }}
          PR Title: ${{ github.event.pull_request.title }}
          PR URL: ${{ github.event.pull_request.html_url }}
          
          From Branch: ${{ github.event.pull_request.head.ref }}
          To Branch: ${{ github.event.pull_request.base.ref }}
          
          PR Opened By: {author}
          Approved By: {approvers}"""
          else:
              comment = f"""GitHub Pull Request CLOSED
          
          Status: CLOSED
          PR Number: #${{ github.event.pull_request.number }}
          PR Title: ${{ github.event.pull_request.title }}
          PR URL: ${{ github.event.pull_request.html_url }}
          
          From Branch: ${{ github.event.pull_request.head.ref }}
          To Branch: ${{ github.event.pull_request.base.ref }}
          
          PR Opened By: {author}"""
          
          data = json.dumps({"issue":{"notes":comment}}).encode()
          
          req = urllib.request.Request(url, data=data, method="PUT")
          req.add_header("X-Redmine-API-Key", "${{ secrets.REDMINE_API_KEY }}")
          req.add_header("Content-Type", "application/json")
          
          urllib.request.urlopen(req)
          EOF
