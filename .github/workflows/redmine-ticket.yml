name: Validate Redmine Ticket on PR

on:
  pull_request:
    branches:
      - develop
    types: [opened, reopened, synchronize, closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate-ticket:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Check VALIDATE_REDMINE flag
        id: flag
        run: |
          FLAG="${{ vars.VALIDATE_REDMINE }}"
          echo "VALIDATE_REDMINE flag: $FLAG"
          if [ "$FLAG" == "YES" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "Redmine validation is ENABLED"
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Redmine validation is DISABLED — skipping all checks"
          fi

      - name: Skip notification
        if: steps.flag.outputs.enabled == 'false'
        run: |
          echo "VALIDATE_REDMINE is set to NO"
          echo "Skipping all Redmine ticket validation steps"

      - name: Extract issue number from branch
        if: steps.flag.outputs.enabled == 'true'
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch name: $BRANCH"
          ISSUE_ID=$(echo "$BRANCH" | grep -oP '\d+')
          echo "Extracted issue ID: $ISSUE_ID"
          if [ -z "$ISSUE_ID" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Check ticket in Redmine
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true'
        id: check
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          PROJECT_NAME="${{ vars.REDMINE_PROJECT_NAME }}"
          REDMINE_URL="${{ vars.REDMINE_URL }}"

          echo "Redmine URL:    $REDMINE_URL"
          echo "Project Name:   $PROJECT_NAME"
          echo "Checking issue: $ISSUE_ID"

          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            "$REDMINE_URL/issues/$ISSUE_ID.json")

          echo "HTTP status: $RESPONSE"
          echo "Redmine response body:"
          cat response.json

          if [ "$RESPONSE" == "200" ]; then
            PROJECT=$(cat response.json | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d['issue']['project']['name'])")
            echo "Ticket belongs to project: $PROJECT"
            echo "project=$PROJECT" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
          else
            echo "project=not_found" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Get PR reviewers and approvers
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true'
        id: reviewers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const reviewRequests = await github.rest.pulls.listRequestedReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const requestedReviewers = reviewRequests.data.users
              .map(u => u.login).join(', ') || 'None';

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const approvers = reviews.data
              .filter(r => r.state === 'APPROVED')
              .map(r => r.user.login)
              .join(', ') || 'No approvals yet';

            const allReviews = reviews.data
              .map(r => `${r.user.login} (${r.state})`)
              .join(', ') || 'No reviews yet';

            core.setOutput('requested_reviewers', requestedReviewers);
            core.setOutput('approvers', approvers);
            core.setOutput('all_reviews', allReviews);

      - name: Post error comment on PR
        if: |
          steps.flag.outputs.enabled == 'true' &&
          (steps.extract.outputs.found == 'false' ||
          steps.check.outputs.project != steps.check.outputs.expected)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueId = '${{ steps.extract.outputs.issue_id }}';
            const foundProject = '${{ steps.check.outputs.project }}';
            const branch = context.payload.pull_request.head.ref;

            let msg = '';
            if ('${{ steps.extract.outputs.found }}' === 'false') {
              msg = [
                `Branch \`${branch}\` does not contain a valid Redmine ticket number.`,
                ``,
                `Please rename your branch to follow the format: \`features/<ticket-id>\``,
                ``,
                `Example: \`features/161\``
              ].join('\n');
            } else {
              msg = [
                `Ticket **#${issueId}** was found in project \`${foundProject || 'not found'}\`.`,
                ``,
                `This PR must reference a ticket from the **${{ vars.REDMINE_PROJECT_NAME }}** project only.`,
                ``,
                `Please make sure your branch references a valid ticket from the correct project.`
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Redmine Ticket Validation Failed\n\n${msg}`
            });

            core.setFailed('Redmine ticket validation failed');

      - name: Post success comment on PR
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueId = '${{ steps.extract.outputs.issue_id }}';
            const project = '${{ steps.check.outputs.project }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Redmine Ticket Validation Passed\n\nTicket **#${issueId}** verified in **${project}**.`
            });

      - name: Write Redmine comment script for PR opened
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected &&
          github.event.action != 'closed'
        run: |
          cat > redmine_comment.py << 'PYEOF'
          import os, json, urllib.request

          issue_id    = os.environ['ISSUE_ID']
          pr_number   = os.environ['PR_NUMBER']
          pr_title    = os.environ['PR_TITLE']
          pr_url      = os.environ['PR_URL']
          pr_state    = os.environ['PR_STATE']
          pr_author   = os.environ['PR_AUTHOR']
          from_branch = os.environ['FROM_BRANCH']
          to_branch   = os.environ['TO_BRANCH']
          repo        = os.environ['REPO']
          reviewers   = os.environ['REQUESTED_REVIEWERS']
          all_reviews = os.environ['ALL_REVIEWS']
          approvers   = os.environ['APPROVERS']
          created_at  = os.environ['PR_CREATED_AT']
          api_key     = os.environ['REDMINE_API_KEY']
          redmine_url = os.environ['REDMINE_URL']

          lines = [
            "### GitHub Pull Request Notification",
            "",
            "**Status:** PR " + pr_state,
            "**PR Number:** #" + pr_number,
            "**PR Title:** " + pr_title,
            "**PR URL:** " + pr_url,
            "",
            "---",
            "",
            "**Branch Details:**",
            "- **From Branch:** `" + from_branch + "`",
            "- **To Branch:** `" + to_branch + "`",
            "- **Repository:** `" + repo + "`",
            "",
            "---",
            "",
            "**People:**",
            "- **PR Opened By:** @" + pr_author,
            "- **Requested Reviewers:** " + reviewers,
            "- **Reviews Submitted:** " + all_reviews,
            "- **Approved By:** " + approvers,
            "",
            "---",
            "",
            "**Timeline:**",
            "- **PR Created At:** " + created_at,
            "",
            "---",
            "",
            "_Added automatically by GitHub Actions webhook_"
          ]

          comment = "\n".join(lines)
          payload = json.dumps({"issue": {"notes": comment}}).encode("utf-8")
          url = redmine_url + "/issues/" + issue_id + ".json"

          req = urllib.request.Request(url, data=payload, method="PUT")
          req.add_header("X-Redmine-API-Key", api_key)
          req.add_header("Content-Type", "application/json")

          with urllib.request.urlopen(req) as resp:
            print("Redmine status: " + str(resp.status))
            print("Ticket #" + issue_id + " updated successfully")
          PYEOF

      - name: Run Redmine comment script for PR opened
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected &&
          github.event.action != 'closed'
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_STATE: ${{ github.event.action }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          FROM_BRANCH: ${{ github.event.pull_request.head.ref }}
          TO_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}
          REQUESTED_REVIEWERS: ${{ steps.reviewers.outputs.requested_reviewers }}
          ALL_REVIEWS: ${{ steps.reviewers.outputs.all_reviews }}
          APPROVERS: ${{ steps.reviewers.outputs.approvers }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_URL: ${{ vars.REDMINE_URL }}
        run: python3 redmine_comment.py

      - name: Write Redmine comment script for PR closed or merged
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected &&
          github.event.action == 'closed'
        run: |
          cat > redmine_closed.py << 'PYEOF'
          import os, json, urllib.request

          issue_id    = os.environ['ISSUE_ID']
          pr_number   = os.environ['PR_NUMBER']
          pr_title    = os.environ['PR_TITLE']
          pr_url      = os.environ['PR_URL']
          pr_author   = os.environ['PR_AUTHOR']
          from_branch = os.environ['FROM_BRANCH']
          to_branch   = os.environ['TO_BRANCH']
          repo        = os.environ['REPO']
          merged      = os.environ['MERGED']
          merged_by   = os.environ.get('MERGED_BY', 'N/A')
          merged_at   = os.environ.get('MERGED_AT', 'N/A')
          closed_at   = os.environ.get('CLOSED_AT', 'N/A')
          approvers   = os.environ['APPROVERS']
          all_reviews = os.environ['ALL_REVIEWS']
          api_key     = os.environ['REDMINE_API_KEY']
          redmine_url = os.environ['REDMINE_URL']

          if merged == 'true':
            status     = 'MERGED'
            merge_info = ["- **Merged By:** @" + merged_by, "- **Merged At:** " + merged_at]
          else:
            status     = 'CLOSED WITHOUT MERGE'
            merge_info = ["- **Closed At:** " + closed_at, "- **Merged:** No"]

          lines = [
            "### GitHub Pull Request " + status,
            "",
            "**Status:** " + status,
            "**PR Number:** #" + pr_number,
            "**PR Title:** " + pr_title,
            "**PR URL:** " + pr_url,
            "",
            "---",
            "",
            "**Branch Details:**",
            "- **From Branch:** `" + from_branch + "`",
            "- **To Branch:** `" + to_branch + "`",
            "- **Repository:** `" + repo + "`",
            "",
            "---",
            "",
            "**People:**",
            "- **PR Opened By:** @" + pr_author,
            "- **Approved By:** " + approvers,
            "- **All Reviews:** " + all_reviews,
            "",
            "---",
            "",
            "**Merge Details:**",
          ] + merge_info + [
            "",
            "---",
            "",
            "_Added automatically by GitHub Actions webhook_"
          ]

          comment = "\n".join(lines)
          payload = json.dumps({"issue": {"notes": comment}}).encode("utf-8")
          url = redmine_url + "/issues/" + issue_id + ".json"

          req = urllib.request.Request(url, data=payload, method="PUT")
          req.add_header("X-Redmine-API-Key", api_key)
          req.add_header("Content-Type", "application/json")

          with urllib.request.urlopen(req) as resp:
            print("Redmine status: " + str(resp.status))
            print("Ticket #" + issue_id + " updated with closed/merged comment")
          PYEOF

      - name: Run Redmine comment script for PR closed or merged
        if: |
          steps.flag.outputs.enabled == 'true' &&
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected &&
          github.event.action == 'closed'
        env:
          ISSUE_ID: ${{ steps.extract.outputs.issue_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          FROM_BRANCH: ${{ github.event.pull_request.head.ref }}
          TO_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}
          MERGED: ${{ github.event.pull_request.merged }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          CLOSED_AT: ${{ github.event.pull_request.closed_at }}
          APPROVERS: ${{ steps.reviewers.outputs.approvers }}
          ALL_REVIEWS: ${{ steps.reviewers.outputs.all_reviews }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_URL: ${{ vars.REDMINE_URL }}
        run: python3 redmine_closed.py
