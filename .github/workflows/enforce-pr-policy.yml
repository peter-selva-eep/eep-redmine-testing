name: Enforce PR Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Validate source branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          VALID_FEATURE="^(features|bugs|issues)/[0-9]+$"
          VALID_SEMVER="^(release|hotfix)/[0-9]+\.[0-9]+(\.[0-9]+)?$"

          if [[ "$BRANCH" =~ $VALID_FEATURE ]] || [[ "$BRANCH" =~ $VALID_SEMVER ]]; then
            echo "Branch name is valid: $BRANCH"
          else
            echo "Non-conforming branch: $BRANCH"
            echo ""
            echo "Allowed formats:"
            echo "  features/<id>"
            echo "  bugs/<id>"
            echo "  issues/<id>"
            echo "  release/<version>"
            echo "  hotfix/<version>"
            echo ""
            echo "Continuing without blocking..."
            exit 0
          fi

      - name: Validate PR title (optional format)
        run: |
          TITLE="${{ github.event.pull_request.title }}"
      
          if echo "$TITLE" | grep -qE '#[0-9]+'; then
            echo "PR title contains issue reference: $TITLE"
          else
            echo "PR title does not contain issue ID (allowed): $TITLE"
          fi
